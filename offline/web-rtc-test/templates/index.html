<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebRTC 1v1 - VERSION 3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython_stdlib.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.2/client-dist/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        video { background: black; border: 2px solid #555; margin: 10px; border-radius: 8px; }
        #stopBtn { background-color: #ff4444; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 5px; }
        #startBtn { background-color: #00c851; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 5px; }
        button:disabled { background-color: #555 !important; cursor: not-allowed; }
    </style>
</head>
<body onload="brython()">

    <h1>WebRTC Test</h1>
    
    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
    
        <div style="text-align: center;">
            <div style="font-weight: bold; color: #00c851; margin-bottom: 5px;">Moi (Local)</div>
            <video id="localVideo" autoplay playsinline muted width="160" height="120" 
                   style="background: black; object-fit: cover; border: 2px solid #00c851;"></video>
        </div>
    
        <div style="text-align: center;">
            <div style="font-weight: bold; color: #33b5e5; margin-bottom: 5px;">L'autre (Distant)</div>
            <video id="remoteVideo" autoplay playsinline width="320" height="240" 
                   style="background: black; object-fit: cover; border: 2px solid #33b5e5;"></video>
        </div>
    
    </div>

    <div id="controls">
        <button id="startBtn">Démarrer l'Appel</button>
        <button id="stopBtn" style="display: none;">Raccrocher</button>
    </div>

<script type="text/python">
from browser import document, window, console

import config

# Configuration "Blindée" pour la 4G/5G
rtc_config = {
    "iceServers": [
        {"urls": "stun:stun.l.google.com:19302"},
        {"urls": "stun:stun1.l.google.com:19302"},
        # On ajoute un serveur de secours STUN supplémentaire
        {"urls": "stun:stun.relay.metered.ca:80"},
        {
            "urls": "turn:global.relay.metered.ca:443",
            "username": config.USERNAME,
            "credential": config.PASSWORD
        }
    ]
}

socket = window.io.connect(window.location.origin)
room = "testroom"
pc = None
local_stream = None

def create_peer_connection():
    global pc, rtc_config
    pc = window.RTCPeerConnection.new(rtc_config)
    console.log("PeerConnection créée")

    # Quand on reçoit un candidat ICE (adresse réseau)
    def on_ice(event):
        if event.candidate:
            socket.emit("signal", {"room": room, "candidate": event.candidate})
    pc.onicecandidate = on_ice

    # Quand le flux vidéo de l'autre arrive
    def on_track(event):
        console.log("Flux distant reçu !")
        remote_v = document["remoteVideo"]
        
        # On récupère le flux JS natif
        streams = event.streams
        
        if streams and len(streams) > 0:
            # On assigne directement sans faire de test 'if x != y'
            new_stream = streams[0]
            remote_v.srcObject = new_stream
            
            # On utilise une fonction simple pour le play
            def force_play():
                remote_v.play()
                console.log("Vidéo en lecture.")
                
            window.setTimeout(force_play, 200)

    pc.ontrack = on_track

    # On ajoute nos pistes locales à la connexion
    if local_stream:
        for track in local_stream.getTracks():
            pc.addTrack(track, local_stream)

ice_candidates_queue = []

def on_signal(data):
    global pc
    
    if "close" in data:
        console.log("L'autre a raccroché")
        window.location.reload()
        return

    # FONCTION POUR VIDER LA QUEUE
    def process_queue():
        while len(ice_candidates_queue) > 0:
            cand = ice_candidates_queue.pop(0)
            pc.addIceCandidate(cand)

    if "offer" in data:
        console.log("Offre reçue")
        if not pc: create_peer_connection()
        offer = window.RTCSessionDescription.new(data["offer"])
        # On accepte l'offre
        pc.setRemoteDescription(offer).then(lambda _: 
            process_queue() or # On traite les candidats en attente
            pc.createAnswer().then(lambda answer:
                pc.setLocalDescription(answer).then(lambda _:
                    socket.emit("signal", {"room": room, "answer": answer})
                )
            )
        )
    elif "answer" in data:
        console.log("Réponse reçue")
        pc.setRemoteDescription(window.RTCSessionDescription.new(data["answer"])).then(lambda _:
            process_queue()
        )
    elif "candidate" in data:
        candidate = window.RTCIceCandidate.new(data["candidate"])
        # Si la description distante n'est pas encore là, on stocke
        if pc and pc.remoteDescription and pc.remoteDescription.type:
            pc.addIceCandidate(candidate)
        else:
            ice_candidates_queue.append(candidate)

socket.on("signal", on_signal)

def stop_call(ev=None):
    socket.emit("signal", {"room": room, "close": True})
    window.location.reload()

def start_call(ev):
    console.log("Clic Start")
    document["stopBtn"].style.display = "inline-block"
    document["startBtn"].disabled = True
    
    socket.emit("join", {"room": room})

    def success(stream):
        global local_stream
        local_stream = stream
        document["localVideo"].srcObject = stream
        
        # Force la lecture locale pour iOS
        document["localVideo"].play()

        # On prépare la connexion
        create_peer_connection()
        
        # On ajoute un petit délai pour laisser à iOS le temps d'initialiser la caméra
        def send_offer():
            # On crée l'offre pour appeler l'autre
            pc.createOffer().then(lambda offer:
                pc.setLocalDescription(offer).then(lambda _:
                    socket.emit("signal", {"room": room, "offer": offer})
                )
            )
        window.setTimeout(send_offer, 500)            

    # On demande du 640x480 maximum pour garantir la fluidité
    options = {
        "video": {
            "width": {"ideal": 640},
            "height": {"ideal": 480}
        },
        "audio": True
    }

    # Demande caméra + micro
    window.navigator.mediaDevices.getUserMedia(options).then(success)

# Liaison des boutons
document["startBtn"].bind("click", start_call)
document["stopBtn"].bind("click", stop_call)
</script>
</body>
</html>
